# docker-compose.yml
version: '3.8'

services:
  traefik:
    image: "traefik:v2.10"
    container_name: "traefik"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=synergyspark-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt_resolver.acme.email=your-email@example.com" # USER MUST REPLACE
      - "--certificatesresolvers.letsencrypt_resolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt_resolver.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt_resolver.acme.httpchallenge.entrypoint=web"
      # Staging server - uncomment for testing to avoid rate limits
      # - "--certificatesresolvers.letsencrypt_resolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      # Production server
      - "--certificatesresolvers.letsencrypt_resolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - synergyspark-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: synergyspark-frontend
    depends_on:
      - backend
    networks:
      - synergyspark-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.rule=Host(`synergy.droh.company`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-secure.rule=Host(`synergy.droh.company`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.tls=true"
      - "traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt_resolver"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synergyspark-backend
    volumes:
      - synergyspark_db_data:/usr/src/app/database
    environment:
      - PORT=3000
      - NODE_ENV=development # Or production, depending on needs
      - GEMINI_API_KEY=\${GEMINI_API_KEY} # Reads from .env file at root or host environment
    networks:
      - synergyspark-net
    restart: unless-stopped

volumes:
  synergyspark_db_data:

networks:
  synergyspark-net:
    driver: bridge
