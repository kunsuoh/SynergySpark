# frontend/nginx.conf
events {} # worker_processes and error_log can be inherited from main nginx.conf

http {
    include /etc/nginx/mime.types; # Include default mime types

    server {
        listen 80;
        server_name localhost;

        # Serve static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy for API requests
        location /api/ {
            proxy_pass http://backend:3000/; # 'backend' is the service name in docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
